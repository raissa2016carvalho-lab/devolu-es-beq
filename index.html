<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Coletor de Devoluções</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}

.header{background:#0f172a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header-ico{width:32px;height:32px;background:#1e293b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:#94a3b8;margin-top:1px}

.corpo{padding:16px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:14px}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px}
.campo-label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;display:block}
input[type=text],input[type=number],select{width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:#0f172a}
input:focus,select:focus{border-color:#0f172a}
input::placeholder{color:#cbd5e1}

/* ETAPAS */
.etapa{display:none}
.etapa.ativa{display:flex;flex-direction:column;gap:14px}

/* CONTADOR */
.contador-wrap{background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:16px;text-align:center}
.contador-num{font-size:48px;font-weight:800;color:#0284c7;line-height:1}
.contador-label{font-size:13px;color:#0369a1;margin-top:4px}
.contador-sub{font-size:12px;color:#64748b;margin-top:8px}

/* FOTOS GRID */
.fotos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.foto-slot{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;cursor:pointer}
.foto-slot.vazio{border:2px dashed #cbd5e1;background:#f8fafc;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.foto-slot.vazio span{font-size:11px;color:#94a3b8}
.foto-slot.vazio svg{opacity:.5}
.foto-slot.preenchido{border:2px solid #16a34a}
.foto-slot img{width:100%;height:100%;object-fit:cover}
.foto-slot .btn-remover{position:absolute;top:4px;right:4px;width:20px;height:20px;background:#ef4444;border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.foto-slot.proxima{border:2px dashed #2563eb;background:#eff6ff;animation:pulsar 1.5s infinite}
@keyframes pulsar{0%,100%{border-color:#2563eb}50%{border-color:#93c5fd}}

/* PROGRESSO */
.progresso-bar{background:#e2e8f0;border-radius:999px;height:8px;overflow:hidden;margin-top:4px}
.progresso-fill{background:#16a34a;height:100%;border-radius:999px;transition:width .3s}
.progresso-label{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px}

/* RESUMO SA */
.resumo-sa{background:#f8fafc;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.resumo-row{display:flex;justify-content:space-between;font-size:13px}
.resumo-row span:first-child{color:#64748b}
.resumo-row span:last-child{font-weight:600;color:#0f172a}
.resumo-row.destaque span:last-child{color:#2563eb;font-size:15px;font-weight:800}

/* BOTÕES */
.btn-primary{width:100%;padding:14px;background:#0f172a;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-primary:hover{background:#1e293b}
.btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
.btn-secondary{width:100%;padding:12px;background:#fff;color:#0f172a;border:1px solid #e2e8f0;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-secondary:hover{background:#f8fafc;border-color:#cbd5e1}

/* CAMPOS INLINE */
.campos-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.ok{background:#16a34a}
.toast.erro{background:#dc2626}

/* HISTÓRICO */
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.hist-item:last-child{border-bottom:none}
.hist-fotos{display:flex;gap:4px}
.hist-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover}
.hist-info{flex:1;min-width:0}
.hist-sa{font-size:13px;font-weight:600}
.hist-det{font-size:11px;color:#64748b;margin-top:2px}
.hist-hora{font-size:11px;color:#94a3b8;flex-shrink:0}
.vazio{text-align:center;padding:20px;color:#94a3b8;font-size:13px}
input[type=file]{display:none}

.tag-consumo{background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px}
.tag-fotos{background:#dcfce7;color:#166534;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px}

/* SLOT NÃO DEVOLVIDO */
.foto-slot.nao-devolvido{border:2px solid #ef4444;background:#fff5f5;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.foto-slot.nao-devolvido span{font-size:10px;color:#ef4444;font-weight:600;text-align:center;padding:0 4px}
.btn-tipo{flex:1;padding:8px 6px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;color:#64748b;transition:all .15s;text-align:center}
.btn-tipo.ativo-foto{background:#dcfce7;border-color:#16a34a;color:#166534}
.btn-tipo.ativo-nao{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.obs-nao{background:#fff5f5;border:1px solid #fca5a5;border-radius:9px;padding:10px 12px;margin-top:6px}
.obs-nao textarea{width:100%;border:none;background:transparent;font-size:13px;font-family:inherit;resize:none;outline:none;color:#0f172a;height:60px}
.obs-nao textarea::placeholder{color:#fca5a5}
</style>
</head>
<body>

<div class="header">
  <div class="header-ico">A</div>
  <div>
    <div class="header-title">Coletor de Devoluções</div>
    <div class="header-sub" id="header-sub">Almoxarifado</div>
  </div>
</div>

<div class="corpo">

  <!-- ETAPA 1: FILIAL + SA + CONTAGENS -->
  <div class="etapa ativa" id="etapa-1">
    <div class="card">
      <label class="campo-label">Filial</label>
      <select id="sel-filial">
        <option value="">Selecione...</option>
        <option value="01">01 — MATRIZ</option>
        <option value="03">03 — PAU DOS FERROS</option>
        <option value="04">04 — ITAPIPOCA</option>
        <option value="06">06 — CURRAIS NOVOS</option>
        <option value="07">07 — SOBRAL</option>
        <option value="08">08 — APARECIDA DE GOIANIA</option>
        <option value="09">09 — MARACANAU</option>
        <option value="10">10 — MOSSORO</option>
        <option value="11">11 — ANAPOLIS</option>
        <option value="13">13 — ALAGOINHAS</option>
        <option value="14">14 — RIBEIRA DO POMBAL</option>
        <option value="15">15 — PAULO AFONSO</option>
        <option value="22">22 — GOIANIA</option>
        <option value="23">23 — BATURITE</option>
        <option value="24">24 — MORRINHOS</option>
        <option value="25">25 — CASCAVEL</option>
        <option value="27">27 — CAUCAIA</option>
        <option value="29">29 — HORIZONTE</option>
        <option value="34">34 — SENHOR DO BONFIM</option>
        <option value="36">36 — LUZIANIA</option>
        <option value="37">37 — DIVINOPOLIS</option>
        <option value="40">40 — GARANHUNS</option>
        <option value="41">41 — FLORIANO</option>
        <option value="42">42 — LIVRAMENTO DE NOSSA SENHORA</option>
        <option value="43">43 — HORTOLANDIA</option>
      </select>
    </div>

    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label class="campo-label">Matrícula do funcionário</label>
        <input type="text" id="inp-matricula" placeholder="Ex: 014943" inputmode="numeric">
      </div>
      <div>
        <label class="campo-label">Número da SA</label>
        <input type="text" id="inp-sa" placeholder="Ex: 123456 ou SA0001" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>

    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <div class="campos-row">
        <div>
          <label class="campo-label">Total de itens na SA</label>
          <input type="number" id="inp-total" placeholder="Ex: 8" min="1" inputmode="numeric">
        </div>
        <div>
          <label class="campo-label">Itens consumíveis</label>
          <input type="number" id="inp-consumo" placeholder="Ex: 3" min="0" inputmode="numeric">
        </div>
      </div>
      <div id="preview-calculo" style="display:none" class="resumo-sa">
        <div class="resumo-row">
          <span>Total de itens</span><span id="prev-total">—</span>
        </div>
        <div class="resumo-row">
          <span>Itens consumíveis <span class="tag-consumo">sem foto</span></span>
          <span id="prev-consumo">—</span>
        </div>
        <div class="resumo-row destaque">
          <span>Fotos necessárias <span class="tag-fotos">obrigatório</span></span>
          <span id="prev-fotos">—</span>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="btn-ir-fotos" onclick="irParaFotos()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Ir para as fotos
    </button>
  </div>

  <!-- ETAPA 2: FOTOS -->
  <div class="etapa" id="etapa-2">
    <div class="card">
      <div class="progresso-label">
        <span id="prog-texto">0 de 0 itens</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progresso-bar">
        <div class="progresso-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="card">
      <div class="contador-wrap" id="contador-wrap">
        <div class="contador-num" id="contador-num">0</div>
        <div class="contador-label" id="contador-label">fotos restantes</div>
        <div class="contador-sub" id="contador-sub">Toque em um slot para fotografar</div>
      </div>
    </div>

    <div class="card">
      <label class="campo-label" style="margin-bottom:10px">Fotos dos itens</label>
      <div class="fotos-grid" id="fotos-grid"></div>
    </div>

    <button class="btn-primary" id="btn-salvar" onclick="tentarSalvar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      Registrar devolução
    </button>
    <button class="btn-secondary" onclick="voltarEtapa1()">← Voltar e editar</button>
  </div>

  <!-- HISTÓRICO -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:13px;font-weight:700;color:#64748b">Registros de hoje</span>
      <span id="hist-count" style="font-size:12px;background:#f1f5f9;padding:2px 8px;border-radius:6px;color:#0f172a;font-weight:700">0</span>
    </div>
    <div id="historico"><div class="vazio">Nenhum registro ainda</div></div>
  </div>

</div>

<input type="file" id="input-foto" accept="image/*" capture="environment">
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vvwtqbehfwrgcmbjdniu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2d3RxYmVoZndyZ2NtYmpkbml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg3NTcsImV4cCI6MjA5NzEwNDc1N30.jHxva16Nae109RiWDlgl21saOJ6gBihstMmlKRRBXis';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Estado
// fotosColetadas[i] = null | { blob, url } | { justificativa: '...' }
let fotosColetadas = [];
let totalFotos = 0;
let slotAtivo = null;
let registrosHoje = [];
let modoJustificativa = false;

// Filial salva
const filialSalva = localStorage.getItem('devolucao_filial');
if (filialSalva) document.getElementById('sel-filial').value = filialSalva;
document.getElementById('sel-filial').addEventListener('change', e => {
  localStorage.setItem('devolucao_filial', e.target.value);
});

['inp-total','inp-consumo'].forEach(id => {
  document.getElementById(id).addEventListener('input', atualizarCalculo);
});

function atualizarCalculo() {
  const total = parseInt(document.getElementById('inp-total').value) || 0;
  const consumo = parseInt(document.getElementById('inp-consumo').value) || 0;
  const fotos = Math.max(0, total - consumo);
  const prev = document.getElementById('preview-calculo');
  if (total > 0) {
    prev.style.display = 'flex';
    document.getElementById('prev-total').textContent = total;
    document.getElementById('prev-consumo').textContent = consumo;
    document.getElementById('prev-fotos').textContent = fotos;
  } else {
    prev.style.display = 'none';
  }
}

function irParaFotos() {
  const filial = document.getElementById('sel-filial').value;
  const matricula = document.getElementById('inp-matricula').value.trim();
  const sa = document.getElementById('inp-sa').value.trim();
  const total = parseInt(document.getElementById('inp-total').value) || 0;
  const consumo = parseInt(document.getElementById('inp-consumo').value) || 0;

  if (!filial) { toast('Selecione a filial', 'erro'); return; }
  if (!matricula) { toast('Informe a matrícula', 'erro'); return; }
  if (!sa) { toast('Informe o número da SA', 'erro'); return; }
  if (total < 1) { toast('Informe o total de itens', 'erro'); return; }
  if (consumo >= total) { toast('Consumíveis não pode ser igual ou maior ao total', 'erro'); return; }

  totalFotos = total - consumo;
  fotosColetadas = new Array(totalFotos).fill(null);
  modoJustificativa = false;

  document.getElementById('etapa-1').classList.remove('ativa');
  document.getElementById('etapa-2').classList.add('ativa');

  renderGaleria();
  atualizarProgresso();
  setTimeout(() => abrirCameraSlot(0), 300);
}

function voltarEtapa1() {
  document.getElementById('etapa-2').classList.remove('ativa');
  document.getElementById('etapa-1').classList.add('ativa');
  fotosColetadas = [];
  modoJustificativa = false;
}

// ── GALERIA ────────────────────────────────────────────────────────────────
function renderGaleria() {
  const grid = document.getElementById('fotos-grid');
  grid.innerHTML = fotosColetadas.map((f, i) => {
    if (f && f.url) {
      // tem foto
      return `<div class="foto-slot preenchido" onclick="abrirCameraSlot(${i})">
        <img src="${f.url}" alt="foto ${i+1}">
        <button class="btn-remover" onclick="removerSlot(event,${i})">✕</button>
      </div>`;
    }
    if (f && f.justificativa !== undefined) {
      // justificado como não devolvido
      return `<div class="foto-slot nao-devolvido" onclick="modoJustificativa && editarJustificativa(${i})">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span>${f.justificativa ? 'Não dev.' : '⚠ sem motivo'}</span>
      </div>`;
    }
    // vazio
    const proxima = !modoJustificativa && fotosColetadas.findIndex(x => !x) === i;
    return `<div class="foto-slot vazio ${proxima?'proxima':''}" onclick="${modoJustificativa ? 'abrirJustificativa('+i+')' : 'abrirCameraSlot('+i+')'}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${modoJustificativa?'#ef4444':'#94a3b8'}" stroke-width="1.5">
        ${modoJustificativa
          ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
          : '<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>'}
      </svg>
      <span style="color:${modoJustificativa?'#ef4444':'#94a3b8'}">${modoJustificativa ? 'Justificar' : 'Item '+(i+1)}</span>
    </div>`;
  }).join('');
}

function atualizarProgresso() {
  const comFoto = fotosColetadas.filter(f => f && f.url).length;
  const comJustOk = fotosColetadas.filter(f => f && f.justificativa && f.justificativa.trim()).length;
  const semJust = fotosColetadas.filter(f => f && f.justificativa !== undefined && !f.justificativa.trim()).length;
  const concluidos = comFoto + comJustOk;
  const pct = totalFotos > 0 ? Math.round(concluidos / totalFotos * 100) : 0;
  const vazios = fotosColetadas.filter(f => !f).length;

  document.getElementById('prog-texto').textContent = concluidos + ' de ' + totalFotos + ' item' + (totalFotos !== 1 ? 'ns' : '');
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = Math.min(100,pct) + '%';

  const wrap = document.getElementById('contador-wrap');
  const num = document.getElementById('contador-num');
  const sub = document.getElementById('contador-sub');

  if (concluidos === totalFotos && semJust === 0) {
    num.textContent = '✓';
    document.getElementById('contador-label').textContent = 'tudo registrado';
    sub.textContent = 'Pronto para enviar!';
    wrap.style.cssText = 'background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px;text-align:center';
    num.style.color = '#16a34a';
    document.getElementById('btn-salvar').disabled = false;
  } else if (modoJustificativa && semJust > 0) {
    num.textContent = semJust;
    document.getElementById('contador-label').textContent = 'sem motivo ainda';
    sub.textContent = 'Toque nos slots vermelhos para justificar';
    wrap.style.cssText = 'background:#fff5f5;border:1px solid #fca5a5;border-radius:12px;padding:16px;text-align:center';
    num.style.color = '#ef4444';
    document.getElementById('btn-salvar').disabled = true;
  } else if (modoJustificativa && vazios > 0) {
    num.textContent = vazios;
    document.getElementById('contador-label').textContent = 'itens sem justificativa';
    sub.textContent = 'Toque nos slots para informar motivo';
    wrap.style.cssText = 'background:#fff5f5;border:1px solid #fca5a5;border-radius:12px;padding:16px;text-align:center';
    num.style.color = '#ef4444';
    document.getElementById('btn-salvar').disabled = true;
  } else {
    num.textContent = vazios;
    document.getElementById('contador-label').textContent = 'fotos restantes';
    sub.textContent = 'Toque em um slot para fotografar';
    wrap.style.cssText = 'background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:16px;text-align:center';
    num.style.color = '#0284c7';
    document.getElementById('btn-salvar').disabled = true;
  }
}

// ── CÂMERA ────────────────────────────────────────────────────────────────
function abrirCameraSlot(idx) {
  slotAtivo = idx;
  document.getElementById('input-foto').click();
}

function removerSlot(e, idx) {
  e.stopPropagation();
  fotosColetadas[idx] = null;
  modoJustificativa = fotosColetadas.some(f => f && f.justificativa !== undefined);
  renderGaleria();
  atualizarProgresso();
}

document.getElementById('input-foto').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file || slotAtivo === null) return;
  const url = URL.createObjectURL(file);
  fotosColetadas[slotAtivo] = { blob: file, url };
  slotAtivo = null;
  e.target.value = '';
  renderGaleria();
  atualizarProgresso();
  const proximo = fotosColetadas.findIndex(x => !x);
  if (proximo !== -1 && !modoJustificativa) setTimeout(() => abrirCameraSlot(proximo), 400);
});

// ── JUSTIFICATIVA ─────────────────────────────────────────────────────────
function tentarSalvar() {
  const vazios = fotosColetadas.filter(f => !f).length;
  if (vazios > 0) {
    // Ativa modo justificativa: slots vazios viram "justificar"
    modoJustificativa = true;
    fotosColetadas = fotosColetadas.map(f => f === null ? { justificativa: '' } : f);
    toast('Informe o motivo para os ' + vazios + ' item(ns) sem foto', 'erro');
    renderGaleria();
    atualizarProgresso();
    return;
  }
  salvar();
}

function abrirJustificativa(idx) {
  const atual = fotosColetadas[idx]?.justificativa || '';
  const motivo = prompt('Motivo para o item ' + (idx+1) + ' não ser devolvido:', atual);
  if (motivo === null) return; // cancelou
  if (!motivo.trim()) { toast('Informe o motivo', 'erro'); return; }
  fotosColetadas[idx] = { justificativa: motivo.trim() };
  renderGaleria();
  atualizarProgresso();
}

function editarJustificativa(idx) {
  abrirJustificativa(idx);
}

// ── SALVAR ────────────────────────────────────────────────────────────────
async function salvar() {
  const filial = document.getElementById('sel-filial').value;
  const matricula = document.getElementById('inp-matricula').value.trim();
  const sa = document.getElementById('inp-sa').value.trim();
  const total = parseInt(document.getElementById('inp-total').value) || 0;
  const consumo = parseInt(document.getElementById('inp-consumo').value) || 0;

  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  btn.innerHTML = '⏳ Salvando...';

  try {
    const registros = [];
    let numItem = 1;

    for (const f of fotosColetadas) {
      if (f && f.url) {
        // upload foto
        const ext = f.blob.name?.split('.').pop() || 'jpg';
        const nome = filial + '_' + matricula + '_' + sa + '_item' + numItem + '_' + Date.now() + '.' + ext;
        const { error: upErr } = await db.storage.from('fotos-devolucoes').upload(nome, f.blob, { contentType: f.blob.type || 'image/jpeg' });
        if (upErr) throw upErr;
        const { data: urlData } = db.storage.from('fotos-devolucoes').getPublicUrl(nome);
        registros.push({ filial, matricula, sa, foto_url: urlData.publicUrl, total_itens: total, itens_consumo: consumo, num_item: numItem, nao_devolvido: false, observacao: null });
      } else if (f && f.justificativa) {
        // não devolvido com justificativa
        registros.push({ filial, matricula, sa, foto_url: null, total_itens: total, itens_consumo: consumo, num_item: numItem, nao_devolvido: true, observacao: f.justificativa });
      }
      numItem++;
    }

    const { error: insErr } = await db.from('devolucoes').insert(registros);
    if (insErr) throw insErr;

    const qtdFotos = fotosColetadas.filter(f => f && f.url).length;
    const qtdNao = fotosColetadas.filter(f => f && f.justificativa).length;
    const msg = qtdFotos + ' foto(s)' + (qtdNao ? ' · ' + qtdNao + ' não devolvido(s)' : '');
    toast('SA ' + sa + ' registrada! ' + msg, 'ok');

    registrosHoje.unshift({ sa, matricula, filial, itens_consumo: consumo, fotos: registros.filter(r=>r.foto_url).map(r=>r.foto_url), nao_devolvidos: qtdNao, criado_em: new Date().toISOString() });
    renderHistorico();

    // limpar
    fotosColetadas = [];
    modoJustificativa = false;
    document.getElementById('inp-matricula').value = '';
    document.getElementById('inp-sa').value = '';
    document.getElementById('inp-total').value = '';
    document.getElementById('inp-consumo').value = '';
    document.getElementById('preview-calculo').style.display = 'none';
    document.getElementById('etapa-2').classList.remove('ativa');
    document.getElementById('etapa-1').classList.add('ativa');

  } catch(err) {
    console.error(err);
    toast('Erro: ' + (err.message || 'tente novamente'), 'erro');
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg> Registrar devolução';
}

// ── HISTÓRICO ─────────────────────────────────────────────────────────────
function fmtHora(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function renderHistorico() {
  const el = document.getElementById('historico');
  document.getElementById('hist-count').textContent = registrosHoje.length;
  if (!registrosHoje.length) { el.innerHTML = '<div class="vazio">Nenhum registro ainda</div>'; return; }
  el.innerHTML = registrosHoje.map(r => `
    <div class="hist-item">
      <div class="hist-fotos">
        ${r.fotos.slice(0,3).map(u => `<img class="hist-thumb" src="${u}" alt="">`).join('')}
        ${r.fotos.length > 3 ? `<div class="hist-thumb" style="background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#64748b;border-radius:6px">+${r.fotos.length-3}</div>` : ''}
        ${r.nao_devolvidos > 0 ? `<div class="hist-thumb" style="background:#fee2e2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#ef4444;border-radius:6px">${r.nao_devolvidos}✗</div>` : ''}
      </div>
      <div class="hist-info">
        <div class="hist-sa">SA ${r.sa} · Mat ${r.matricula}</div>
        <div class="hist-det">${r.fotos.length} foto(s)${r.nao_devolvidos?' · '+r.nao_devolvidos+' não dev.':''} · ${r.itens_consumo} consumível(is) · Filial ${r.filial}</div>
      </div>
      <div class="hist-hora">${fmtHora(r.criado_em)}</div>
    </div>
  `).join('');
}

async function carregarHoje() {
  const hoje = new Date().toISOString().slice(0,10);
  const { data } = await db.from('devolucoes').select('*').gte('criado_em', hoje+'T00:00:00').order('criado_em', { ascending: false });
  if (!data?.length) return;
  const grupos = {};
  data.forEach(r => {
    const key = r.sa + '_' + r.matricula;
    if (!grupos[key]) grupos[key] = { sa: r.sa, matricula: r.matricula, filial: r.filial, itens_consumo: r.itens_consumo||0, fotos: [], nao_devolvidos: 0, criado_em: r.criado_em };
    if (r.foto_url) grupos[key].fotos.push(r.foto_url);
    if (r.nao_devolvido) grupos[key].nao_devolvidos++;
  });
  registrosHoje = Object.values(grupos);
  renderHistorico();
}

carregarHoje();
</script>
