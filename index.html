<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Coletor de Devoluções</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}

.header{background:#0f172a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.header-ico{width:32px;height:32px;background:#1e293b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:#94a3b8;margin-top:1px}

.corpo{padding:20px;max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:16px}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px}

/* FILIAL */
.filial-label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;display:block}
select{width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;outline:none;background:#fff;color:#0f172a;appearance:auto}
select:focus{border-color:#0f172a}

/* FOTO */
.foto-area{border:2px dashed #cbd5e1;border-radius:12px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;background:#f8fafc;transition:border-color .2s}
.foto-area:hover{border-color:#94a3b8}
.foto-area.tem-foto{border:2px solid #e2e8f0}
.foto-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:#94a3b8;pointer-events:none}
.foto-placeholder svg{width:40px;height:40px;opacity:.6}
.foto-placeholder span{font-size:13px}
.foto-preview{width:100%;height:100%;object-fit:cover;display:none}
.foto-area.tem-foto .foto-preview{display:block}
.foto-area.tem-foto .foto-placeholder{display:none}
.btn-retake{position:absolute;bottom:10px;right:10px;background:#0f172a;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
input[type=file]{display:none}

/* CAMPOS */
.campo-label{font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;display:block}
input[type=text]{width:100%;padding:11px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:15px;font-family:inherit;outline:none;margin-bottom:0}
input[type=text]:focus{border-color:#0f172a}
input[type=text]::placeholder{color:#cbd5e1}

/* BTN SALVAR */
.btn-salvar{width:100%;padding:15px;background:#0f172a;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-salvar:hover{background:#1e293b}
.btn-salvar:disabled{background:#94a3b8;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.erro{background:#dc2626}
.toast.ok{background:#16a34a}

/* HISTÓRICO */
.hist-title{font-size:13px;font-weight:700;color:#64748b;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.hist-item:last-child{border-bottom:none}
.hist-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#f1f5f9;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-sa{font-size:13px;font-weight:600;color:#0f172a}
.hist-mat{font-size:12px;color:#64748b}
.hist-filial{font-size:11px;color:#94a3b8}
.hist-hora{font-size:11px;color:#94a3b8;flex-shrink:0}
.vazio-hist{text-align:center;padding:20px;color:#94a3b8;font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="header-ico">A</div>
  <div>
    <div class="header-title">Coletor de Devoluções</div>
    <div class="header-sub" id="header-sub">Almoxarifado</div>
  </div>
</div>

<div class="corpo">

  <!-- FILIAL -->
  <div class="card">
    <label class="filial-label">Filial</label>
    <select id="sel-filial">
      <option value="">Selecione a filial...</option>
      <option value="01">01 — MATRIZ</option>
      <option value="03">03 — PAU DOS FERROS</option>
      <option value="04">04 — ITAPIPOCA</option>
      <option value="06">06 — CURRAIS NOVOS</option>
      <option value="07">07 — SOBRAL</option>
      <option value="08">08 — APARECIDA DE GOIANIA</option>
      <option value="09">09 — MARACANAU</option>
      <option value="10">10 — MOSSORO</option>
      <option value="11">11 — ANAPOLIS</option>
      <option value="13">13 — ALAGOINHAS</option>
      <option value="14">14 — RIBEIRA DO POMBAL</option>
      <option value="15">15 — PAULO AFONSO</option>
      <option value="22">22 — GOIANIA</option>
      <option value="23">23 — BATURITE</option>
      <option value="24">24 — MORRINHOS</option>
      <option value="25">25 — CASCAVEL</option>
      <option value="27">27 — CAUCAIA</option>
      <option value="29">29 — HORIZONTE</option>
      <option value="34">34 — SENHOR DO BONFIM</option>
      <option value="36">36 — LUZIANIA</option>
      <option value="37">37 — DIVINOPOLIS</option>
      <option value="40">40 — GARANHUNS</option>
      <option value="41">41 — FLORIANO</option>
      <option value="42">42 — LIVRAMENTO DE NOSSA SENHORA</option>
      <option value="43">43 — HORTOLANDIA</option>
    </select>
  </div>

  <!-- FOTO -->
  <div class="card">
    <label class="campo-label">Foto do item devolvido</label>
    <div class="foto-area" id="foto-area" onclick="abrirCamera()">
      <div class="foto-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Toque para fotografar</span>
      </div>
      <img class="foto-preview" id="foto-preview" alt="Foto do item">
      <button class="btn-retake" id="btn-retake" style="display:none" onclick="trocarFoto(event)">Trocar foto</button>
    </div>
    <input type="file" id="input-foto" accept="image/*" capture="environment">
  </div>

  <!-- MATRÍCULA E SA -->
  <div class="card" style="display:flex;flex-direction:column;gap:14px">
    <div>
      <label class="campo-label">Matrícula do funcionário</label>
      <input type="text" id="inp-matricula" placeholder="Ex: 00123" inputmode="numeric">
    </div>
    <div>
      <label class="campo-label">Número da SA</label>
      <input type="text" id="inp-sa" placeholder="Ex: 000123">
    </div>
  </div>

  <!-- BOTÃO -->
  <button class="btn-salvar" id="btn-salvar" onclick="salvar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
    Registrar devolução
  </button>

  <!-- HISTÓRICO -->
  <div class="card">
    <div class="hist-title">
      <span>Registros de hoje</span>
      <span id="hist-count" style="font-size:12px;background:#f1f5f9;padding:2px 8px;border-radius:6px;color:#0f172a">0</span>
    </div>
    <div id="historico"><div class="vazio-hist">Nenhum registro ainda</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vvwtqbehfwrgcmbjdniu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2d3RxYmVoZndyZ2NtYmpkbml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg3NTcsImV4cCI6MjA5NzEwNDc1N30.jHxva16Nae109RiWDlgl21saOJ6gBihstMmlKRRBXis';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let fotoBlob = null;
let registrosHoje = [];

// Recuperar filial do localStorage
const filialSalva = localStorage.getItem('devolucao_filial');
if (filialSalva) document.getElementById('sel-filial').value = filialSalva;

document.getElementById('sel-filial').addEventListener('change', e => {
  localStorage.setItem('devolucao_filial', e.target.value);
});

document.getElementById('input-foto').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  fotoBlob = file;
  const url = URL.createObjectURL(file);
  document.getElementById('foto-preview').src = url;
  document.getElementById('foto-area').classList.add('tem-foto');
  document.getElementById('btn-retake').style.display = 'block';
  e.target.value = '';
});

function abrirCamera() {
  document.getElementById('input-foto').click();
}

function trocarFoto(e) {
  e.stopPropagation();
  document.getElementById('input-foto').click();
}

function toast(msg, tipo = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + tipo;
  setTimeout(() => el.className = 'toast', 2500);
}

async function salvar() {
  const filial = document.getElementById('sel-filial').value;
  const matricula = document.getElementById('inp-matricula').value.trim();
  const sa = document.getElementById('inp-sa').value.trim();

  if (!filial) { toast('Selecione a filial', 'erro'); return; }
  if (!fotoBlob) { toast('Tire uma foto do item', 'erro'); return; }
  if (!matricula) { toast('Informe a matrícula', 'erro'); return; }
  if (!sa) { toast('Informe o número da SA', 'erro'); return; }

  const btn = document.getElementById('btn-salvar');
  btn.disabled = true;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Salvando...';

  try {
    // 1. Upload da foto
    const ext = fotoBlob.name?.split('.').pop() || 'jpg';
    const nomeArquivo = filial + '_' + matricula + '_' + sa + '_' + Date.now() + '.' + ext;
    const { error: uploadErr } = await db.storage
      .from('fotos-devolucoes')
      .upload(nomeArquivo, fotoBlob, { contentType: fotoBlob.type || 'image/jpeg' });

    if (uploadErr) throw uploadErr;

    // 2. URL pública
    const { data: urlData } = db.storage.from('fotos-devolucoes').getPublicUrl(nomeArquivo);
    const fotoUrl = urlData.publicUrl;

    // 3. Inserir no banco
    const { error: insertErr } = await db.from('devolucoes').insert({
      filial,
      matricula,
      sa,
      foto_url: fotoUrl
    });

    if (insertErr) throw insertErr;

    toast('Devolução registrada!', 'ok');

    // Adicionar ao histórico local
    registrosHoje.unshift({ filial, matricula, sa, foto_url: fotoUrl, criado_em: new Date().toISOString() });
    renderHistorico();

    // Limpar campos (manter filial)
    fotoBlob = null;
    document.getElementById('foto-preview').src = '';
    document.getElementById('foto-area').classList.remove('tem-foto');
    document.getElementById('btn-retake').style.display = 'none';
    document.getElementById('inp-matricula').value = '';
    document.getElementById('inp-sa').value = '';

  } catch (err) {
    console.error(err);
    toast('Erro ao salvar: ' + (err.message || 'tente novamente'), 'erro');
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg> Registrar devolução';
}

function fmtHora(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function renderHistorico() {
  const el = document.getElementById('historico');
  document.getElementById('hist-count').textContent = registrosHoje.length;
  if (!registrosHoje.length) {
    el.innerHTML = '<div class="vazio-hist">Nenhum registro ainda</div>';
    return;
  }
  el.innerHTML = registrosHoje.map(r => `
    <div class="hist-item">
      <img class="hist-thumb" src="${r.foto_url}" alt="foto">
      <div class="hist-info">
        <div class="hist-sa">SA: ${r.sa}</div>
        <div class="hist-mat">Mat: ${r.matricula}</div>
        <div class="hist-filial">Filial ${r.filial}</div>
      </div>
      <div class="hist-hora">${fmtHora(r.criado_em)}</div>
    </div>
  `).join('');
}

// Carregar registros de hoje ao abrir
async function carregarHoje() {
  const hoje = new Date().toISOString().slice(0, 10);
  const { data } = await db.from('devolucoes')
    .select('*')
    .gte('criado_em', hoje + 'T00:00:00')
    .order('criado_em', { ascending: false });
  if (data) { registrosHoje = data; renderHistorico(); }
}

carregarHoje();
</script>
</body>
</html>
