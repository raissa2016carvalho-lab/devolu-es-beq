<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entregas do Dia — Almoxarifado</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}

  /* LOGIN */
  .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .login-card{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:380px;box-shadow:0 4px 24px #00000010}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .login-logo .ico{width:36px;height:36px;background:#0f172a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px}
  .login-logo .txt{font-size:15px;font-weight:700;color:#0f172a}
  .login-logo .sub{font-size:11px;color:#64748b;margin-top:1px}
  .login-card h2{font-size:18px;font-weight:700;margin-bottom:4px}
  .login-card p{font-size:13px;color:#64748b;margin-bottom:20px}
  label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px}
  input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
  input:focus{border-color:#0f172a}
  .btn{width:100%;padding:12px;background:#0f172a;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .btn:hover{background:#1e293b}
  .msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:12px}
  .erro{background:#fee2e2;color:#991b1b}

  /* APP */
  #app{display:none}
  .header{background:#0f172a;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .header-ico{width:30px;height:30px;background:#1e293b;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .header-title{font-size:14px;font-weight:700}
  .header-sub{font-size:11px;color:#94a3b8;margin-top:1px}
  .btn-sair{background:none;border:1px solid #334155;color:#94a3b8;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}

  .filtros{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:57px;z-index:99}
  .filtros input[type=date]{padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:0}
  .filtros input[type=text]{flex:1;min-width:160px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:0}
  .badge-count{background:#f1f5f9;border-radius:6px;padding:4px 10px;font-size:12px;color:#64748b;white-space:nowrap}
  .badge-count b{color:#0f172a}

  .corpo{padding:16px 20px;max-width:900px;margin:0 auto}

  /* CARD DE ITEM */
  .item-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
  .item-card:hover{box-shadow:0 2px 12px #00000010}
  .item-card.devolvido{border-left:4px solid #16a34a}
  .item-card.nao_devolvido{border-left:4px solid #ef4444}
  .item-card.pendente{border-left:4px solid #e2e8f0}

  .item-body{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
  .item-info{flex:1;min-width:0}
  .item-desc{font-size:14px;font-weight:600;color:#0f172a;line-height:1.3}
  .item-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .meta-tag{font-size:11.5px;color:#64748b;background:#f8fafc;border-radius:4px;padding:2px 7px}
  .meta-tag b{color:#0f172a}

  .item-acoes{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .btn-dev{width:40px;height:40px;border:none;border-radius:9px;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .btn-sim{background:#dcfce7;color:#16a34a}
  .btn-sim:hover,.btn-sim.ativo{background:#16a34a;color:#fff}
  .btn-nao{background:#fee2e2;color:#ef4444}
  .btn-nao:hover,.btn-nao.ativo{background:#ef4444;color:#fff}

  .obs-area{padding:0 16px 14px;display:none}
  .obs-area.aberta{display:block}
  .obs-area label{font-size:12px;font-weight:600;color:#ef4444;margin-bottom:4px}
  .obs-area textarea{width:100%;padding:8px 10px;border:1px solid #fca5a5;border-radius:8px;font-size:13px;font-family:inherit;resize:none;height:72px;outline:none;margin-bottom:0}
  .obs-area textarea:focus{border-color:#ef4444}
  .btn-salvar-obs{margin-top:8px;background:#0f172a;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

  .status-pill{font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;white-space:nowrap}
  .pill-dev{background:#dcfce7;color:#166534}
  .pill-nao{background:#fee2e2;color:#991b1b}
  .pill-pend{background:#f1f5f9;color:#64748b}

  .tbl-entregas{border-collapse:collapse;width:100%;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px #00000008}
  .tbl-entregas th{text-align:left;background:#f8fafc;border-bottom:2px solid #e2e8f0;padding:9px 12px;font-size:11.5px;font-weight:600;color:#64748b}
  .tbl-entregas td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  .tbl-entregas tr.tr-dev td{background:#f0fdf4}
  .tbl-entregas tr.tr-nao td{background:#fff5f5}
  .tbl-entregas tr:hover td{background:#fafafa}
  .tbl-entregas tr.tr-dev:hover td{background:#dcfce7}
  .tbl-entregas tr.tr-nao:hover td{background:#fee2e2}
  .vazio{text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px}
  .loading{text-align:center;padding:40px;color:#94a3b8}

  /* RESUMO */
  .resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .resumo-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center}
  .resumo-num{font-size:24px;font-weight:800;line-height:1}
  .resumo-label{font-size:11px;color:#64748b;margin-top:4px}
  .num-verde{color:#16a34a}
  .num-vermelha{color:#ef4444}
  .num-cinza{color:#64748b}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="tela-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="ico">A</div>
      <div>
        <div class="txt">Almoxarifado</div>
        <div class="sub">Controle de devoluções</div>
      </div>
    </div>
    <h2>Entrar</h2>
    <p>Acesse com seu e-mail e senha cadastrados.</p>
    <div id="login-msg"></div>
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••">
    <button class="btn" id="btn-login">Entrar</button>

</div>

<!-- SELEÇÃO DE FILIAL -->
<div class="login-wrap" id="tela-filial" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <div class="ico">A</div>
      <div>
        <div class="txt">Almoxarifado</div>
        <div class="sub">Controle de devoluções</div>
      </div>
    </div>
    <h2>Qual é sua filial?</h2>
    <p>Selecione a filial que você gerencia.</p>
    <label>Filial</label>
    <select id="select-filial" style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;margin-bottom:14px;outline:none">
      <option value="">Selecione...</option>
      <option value="01">01 — MATRIZ</option>
      <option value="03">03 — PAU DOS FERROS</option>

      <option value="27">27 — CAUCAIA</option>

      <option value="34">34 — SENHOR DO BONFIM</option>
      <option value="36">36 — LUZIANIA</option>
      <option value="37">37 — DIVINOPOLIS</option>
      <option value="40">40 — GARANHUNS</option>
      <option value="41">41 — FLORIANO</option>

</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-ico">A</div>
      <div>
        <div class="header-title">Entregas do Dia</div>
        <div class="header-sub" id="header-sub">Almoxarifado</div>
      </div>
    </div>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </div>

  <div class="filtros">
    <input type="date" id="filtro-data">
    <input type="text" id="filtro-busca" placeholder="🔍 Buscar por item ou funcionário...">
    <div class="badge-count" id="badge-count"></div>
  </div>

  <div class="corpo">
    <div class="resumo">
      <div class="resumo-card">
        <div class="resumo-num num-verde" id="count-dev">—</div>
        <div class="resumo-label">Devolvidos</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-num num-vermelha" id="count-nao">—</div>
        <div class="resumo-label">Não devolvidos</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-num num-cinza" id="count-pend">—</div>
        <div class="resumo-label">Pendentes</div>
      </div>
    </div>
    <div id="lista"><div class="loading">Carregando...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vvwtqbehfwrgcmbjdniu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2d3RxYmVoZndyZ2NtYmpkbml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mjg3NTcsImV4cCI6MjA5NzEwNDc1N30.jHxva16Nae109RiWDlgl21saOJ6gBihstMmlKRRBXis';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userEmail = '';
let userFilial = '';
let todasEntregas = [];

// ── LOGIN ─────────────────────────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const msgEl = document.getElementById('login-msg');
  msgEl.innerHTML = '';
  if (!email || !senha) { msgEl.innerHTML = '<div class="msg erro">Preencha e-mail e senha.</div>'; return; }
  document.getElementById('btn-login').textContent = 'Entrando...';
  const { error } = await db.auth.signInWithPassword({ email, password: senha });
  document.getElementById('btn-login').textContent = 'Entrar';
  if (error) { msgEl.innerHTML = '<div class="msg erro">E-mail ou senha inválidos.</div>'; return; }
  iniciarApp(email);
});

document.getElementById('senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});

document.getElementById('btn-sair').addEventListener('click', async () => {
  await db.auth.signOut();
  location.reload();
});

async function verificarSessao() {
  const { data } = await db.auth.getSession();
  if (data.session) iniciarApp(data.session.user.email);
}

async function iniciarApp(email) {
  userEmail = email;
  document.getElementById('tela-login').style.display = 'none';
  // Verificar se já tem filial salva na sessão
  document.getElementById('tela-filial').style.display = 'flex';
}

document.getElementById('btn-filial').addEventListener('click', () => {
  const sel = document.getElementById('select-filial').value;
  if (!sel) { alert('Selecione uma filial.'); return; }
  userFilial = sel;
  document.getElementById('tela-filial').style.display = 'none';
  abrirApp();
});

const FILIAIS_NOMES = {'01':'MATRIZ','03':'PAU DOS FERROS','04':'ITAPIPOCA','06':'CURRAIS NOVOS','07':'SOBRAL','08':'APARECIDA DE GOIANIA','09':'MARACANAU','10':'MOSSORO','11':'ANAPOLIS','13':'ALAGOINHAS','14':'RIBEIRA DO POMBAL','15':'PAULO AFONSO','22':'GOIANIA','23':'BATURITE','24':'MORRINHOS','25':'CASCAVEL','27':'CAUCAIA','29':'HORIZONTE','34':'SENHOR DO BONFIM','36':'LUZIANIA','37':'DIVINOPOLIS','40':'GARANHUNS','41':'FLORIANO','42':'LIVRAMENTO DE NOSSA SENHORA','43':'HORTOLANDIA'};

async function abrirApp() {
  document.getElementById('app').style.display = 'block';
  const filialNome = FILIAIS_NOMES[userFilial] || ('Filial ' + userFilial);
  document.getElementById('header-sub').textContent = userEmail + ' · ' + filialNome;

  // Data padrão = hoje
  const hoje = new Date().toISOString().slice(0, 10);
  document.getElementById('filtro-data').value = hoje;

  await carregarEntregas();

  document.getElementById('filtro-data').addEventListener('change', carregarEntregas);
  document.getElementById('filtro-busca').addEventListener('input', filtrarLista);
}

async function carregarEntregas() {
  document.getElementById('lista').innerHTML = '<div class="loading">Carregando...</div>';
  const dataEl = document.getElementById('filtro-data').value;
  const dataProtheus = dataEl.replace(/-/g, '');

  const filialBusca = userFilial ? userFilial.padStart(2, '0') : '';
  console.log('[debug] data:', dataProtheus, 'filial:', filialBusca);
  let query = db.from('entregas_almoxarife')
    .select('*')
    .eq('emissao', dataProtheus)
    .order('hora', { ascending: false });

  if (filialBusca) query = query.eq('filial', filialBusca);

  const { data, error } = await query;
  console.log('[debug] resultado:', data?.length, 'erro:', error?.message);
  if (error) { 
    document.getElementById('lista').innerHTML = '<div class="vazio">Erro: ' + error.message + '</div>'; 
    return; 
  }

  todasEntregas = data || [];
  filtrarLista();
}

function filtrarLista() {
  const busca = (document.getElementById('filtro-busca').value || '').toLowerCase();
  const visiveis = busca
    ? todasEntregas.filter(e =>
        (e.descricao || '').toLowerCase().includes(busca) ||
        (e.solicitante || '').toLowerCase().includes(busca) ||
        (e.matricula || '').includes(busca) ||
        (e.produto || '').includes(busca)
      )
    : todasEntregas;
  renderLista(visiveis);
}

function fmtData(str) {
  if (!str || str.length < 8) return str;
  return str.slice(6,8) + '/' + str.slice(4,6) + '/' + str.slice(0,4);
}

function renderLista(entregas) {
  const dev = entregas.filter(e => e.status === 'devolvido').length;
  const nao = entregas.filter(e => e.status === 'nao_devolvido').length;
  const pend = entregas.filter(e => e.status === 'pendente').length;

  document.getElementById('count-dev').textContent = dev;
  document.getElementById('count-nao').textContent = nao;
  document.getElementById('count-pend').textContent = pend;
  document.getElementById('badge-count').innerHTML = '<b>' + entregas.length + '</b> entrega(s)';

  if (!entregas.length) {
    document.getElementById('lista').innerHTML = '<div class="vazio">Nenhuma entrega encontrada para esta data.</div>';
    return;
  }

  // Tabela
  let html = '<table class="tbl-entregas"><thead><tr>'
    + '<th>Hora</th><th>Matrícula</th><th>Nº SA</th><th>Item</th>'
    + '<th style="text-align:center">Qtd</th><th>CC</th>'
    + '<th style="text-align:center">Status</th>'
    + '<th style="text-align:center">Ação</th>'
    + '</tr></thead><tbody>';

  entregas.forEach(e => {
    const st = e.status || 'pendente';
    const trClass = st === 'devolvido' ? 'tr-dev' : st === 'nao_devolvido' ? 'tr-nao' : '';
    const pillHtml = st === 'devolvido'
      ? '<span class="status-pill pill-dev">✓ Dev.</span>'
      : st === 'nao_devolvido'
      ? '<span class="status-pill pill-nao">✗ Não dev.</span>'
      : '<span class="status-pill pill-pend">Pendente</span>';

    html += '<tr class="' + trClass + '" id="card-' + e.id + '">'
      + '<td style="white-space:nowrap;color:#64748b;font-size:12px">' + String(e.hora||'—').slice(0,5) + '</td>'
      + '<td style="font-family:ui-monospace,monospace;font-size:12px">' + (e.matricula||'—') + '</td>'
      + '<td style="font-size:13px">' + (e.sa||e.numero_sa||e.num_sa||'—') + '</td>'
      + '<td><div style="font-size:13px;font-weight:500">' + (e.descricao||e.produto) + '</div>'
      + (e.observacao ? '<div style="font-size:11px;color:#ef4444;font-style:italic">Obs: ' + e.observacao + '</div>' : '')
      + '</td>'
      + '<td style="text-align:center;font-family:ui-monospace,monospace;font-weight:700">' + (e.quantidade||0) + '</td>'
      + '<td style="font-size:11px;color:#64748b">' + (e.cc||'—') + '</td>'
      + '<td style="text-align:center">' + pillHtml + '</td>'
      + '<td style="text-align:center;white-space:nowrap">'
      + '<button class="btn-dev btn-sim ' + (st==='devolvido'?'ativo':'') + '" onclick="marcar(' + e.id + ', \'devolvido\')" title="Devolvido">✓</button> '
      + '<button class="btn-dev btn-nao ' + (st==='nao_devolvido'?'ativo':'') + '" onclick="abrirObs(' + e.id + ')" title="Não devolvido">✗</button>'
      + '</td>'
      + '</tr>';

    if (st === 'nao_devolvido' || e._obsAberta) {
      html += '<tr id="obs-row-' + e.id + '"><td colspan="8" style="padding:0 12px 12px">'
        + '<div style="background:#fff5f5;border-radius:8px;padding:10px;display:flex;gap:8px;align-items:flex-end">'
        + '<div style="flex:1"><label style="font-size:11px;font-weight:600;color:#ef4444;display:block;margin-bottom:4px">⚠ Motivo da não devolução</label>'
        + '<textarea id="txt-' + e.id + '" style="width:100%;padding:7px 10px;border:1px solid #fca5a5;border-radius:7px;font-size:13px;font-family:inherit;resize:none;height:60px;outline:none">' + (e.observacao||'') + '</textarea></div>'
        + '<button class="btn-salvar-obs" onclick="marcarNao(' + e.id + ')">Salvar</button>'
        + '</div></td></tr>';
    }
  });

  html += '</tbody></table>';
  document.getElementById('lista').innerHTML = html;
}

async function marcar(id, status) {
  await db.from('entregas_almoxarife').update({
    status,
    observacao: null,
    respondido_em: new Date().toISOString()
  }).eq('id', id);

  const idx = todasEntregas.findIndex(e => e.id === id);
  if (idx >= 0) { todasEntregas[idx].status = status; todasEntregas[idx].observacao = null; }
  filtrarLista();
}

function abrirObs(id) {
  // Renderizar linha de obs se não existir
  let obsRow = document.getElementById('obs-row-' + id);
  if (!obsRow) {
    const row = document.getElementById('card-' + id);
    if (!row) return;
    const tr = document.createElement('tr');
    tr.id = 'obs-row-' + id;
    tr.innerHTML = '<td colspan="8" style="padding:0 12px 12px">'
      + '<div style="background:#fff5f5;border-radius:8px;padding:10px;display:flex;gap:8px;align-items:flex-end">'
      + '<div style="flex:1"><label style="font-size:11px;font-weight:600;color:#ef4444;display:block;margin-bottom:4px">⚠ Motivo da não devolução</label>'
      + '<textarea id="txt-' + id + '" style="width:100%;padding:7px 10px;border:1px solid #fca5a5;border-radius:7px;font-size:13px;font-family:inherit;resize:none;height:60px;outline:none" placeholder="Ex.: item danificado, ainda em uso, perdido..."></textarea></div>'
      + '<button class="btn-salvar-obs" onclick="marcarNao(' + id + ')">Salvar</button>'
      + '</div></td>';
    row.insertAdjacentElement('afterend', tr);
    obsRow = tr;
  }
  obsRow.style.display = '';
  document.getElementById('txt-' + id)?.focus();
}

async function marcarNao(id) {
  const obs = (document.getElementById('txt-' + id)?.value || '').trim();
  if (!obs) { alert('Informe o motivo da não devolução.'); return; }
  await db.from('entregas_almoxarife').update({
    status: 'nao_devolvido',
    observacao: obs,
    respondido_em: new Date().toISOString()
  }).eq('id', id);
  const idx = todasEntregas.findIndex(e => e.id === id);
  if (idx >= 0) { todasEntregas[idx].status = 'nao_devolvido'; todasEntregas[idx].observacao = obs; }
  filtrarLista();
}

window.marcar = marcar;
window.abrirObs = abrirObs;
window.marcarNao = marcarNao;

verificarSessao();
</script>
